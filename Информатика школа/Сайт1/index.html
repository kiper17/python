<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Лощилова Анна">
    <!--Мета-теги-->
    <meta name="description" content="Сайт об оптических иллюзиях, их видах и научных объяснениях">
    <meta name="keywords" content="оптические иллюзии, визуальное восприятие, обман зрения, виды иллюзий, наука, психология">
    <title>Главная страница</title>
    <!--Импорт стилей-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gravitas+One&display=swap" rel="stylesheet">   
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Gravitas One', cursive;
            background-color: #c3e4f5;
        }

        header {
            background-color: #c3e4f5;
            padding: 15px 0;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: space-around;
            padding: 0 50px;
        }

        /*Стили для навигации*/
        nav ul li {
            margin: 0 20px;
        }

        nav ul li a {
            color: #333;
            text-decoration: none;
            font-size: 20px;
            padding: 5px 10px;
            border-radius: 3px;
            transition: background-color 0.3s;
        }

        nav ul li a:hover {
            background-color: #555;
            color: white;
        }

        /*Стили для баннера с текстом*/
        .hero {
            background-image: url('image/image1.png');
            background-size: cover;
            background-position: center;
            height: 500px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            position: relative;
        }

        .hero-content {
            text-align: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            padding-top: 400px;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: bold;
            margin-top: 0px;
            margin-bottom: 20px;
        }

        .content-block {
            border: 2px solid black;
            margin: 20px;
            padding: 30px;
            width: calc(100% - 40px);
            height: 25vh;
            text-align: center;
            font-size: 40px;
            color: #333;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="types.html">Виды</a></li>
                <li><a href="contacts.html">Контакты</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Удивительные оптические иллюзии</h1>
        </div>
    </section>

    <section class="content-block">
        <p>Оптические иллюзии показывают, как мозг интерпретирует реальность — и как часто он делает это неверно. Цвета, формы и движение могут выглядеть иначе, чем есть на самом деле.</p>
    </section>
</body>
</html>
