<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Artem35</title>
    <!-- SEO/служебные мета-теги -->
    <meta name="author" content="Хомяков Артём">
    <meta name="description" content="Магазин Artem35 — информация о заказах и доставке по России. Проверка заказа онлайн.">
    <meta name="keywords" content="Artem35, магазин, доставка, заказ, проверить заказ, отслеживание, Вологда, доставка по России">
    <style>
        :root {
            --accent: #c49300;
            --accent-hover: #ab8000;
            --footer-bg: #0f1113;
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: #ffffff;
            background: #000;
        }

        .hero {
            min-height: 100vh;
            display: grid;
            align-items: center;
            padding: 48px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: url("image.png") center / cover no-repeat;
            filter: saturate(1.05) contrast(1.05);
            transform: scale(1.02);
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
        }

        .content {
            position: relative;
            z-index: 1;
            max-width: 980px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: clamp(40px, 6.5vw, 86px);
            line-height: 1.05;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        p {
            margin: 22px 0 0;
            font-size: clamp(16px, 2.1vw, 22px);
            line-height: 1.5;
            opacity: 0.92;
            max-width: 60ch;
            margin-left: auto;
            margin-right: auto;
        }

        .actions {
            margin-top: 34px;
            display: flex;
            justify-content: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 280px;
            min-height: 54px;
            padding: 16px 26px;
            border-radius: 0px;
            background: var(--accent);
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            border: 0;
            transition: background-color 0.15s ease, transform 0.12s ease;
        }

        .site-footer {
            background: var(--footer-bg);
            padding: 64px 18px;
            text-align: center;
        }

        .footer-inner {
            max-width: 980px;
            margin: 0 auto;
        }

        .footer-main {
            font-size: clamp(22px, 3.2vw, 34px);
            font-weight: 800;
            line-height: 1.25;
        }

        .footer-main a {
            color: #ffffff;
            text-decoration: none;
        }

        .footer-main a:hover { text-decoration: underline; }

        .footer-sub {
            margin-top: 18px;
            font-size: 12px;
            opacity: 0.75;
        }

        .social {
            margin-top: 18px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .social a {
            width: 30px;
            height: 30px;
            border-radius: 999px;
            background: var(--accent);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.15s ease, transform 0.12s ease;
        }
    </style>
</head>
<body>
    <!-- Главный блок (герой-секция) с фоном image.png и затемнением -->
    <main class="hero">
        <div class="content">
            <!-- Заголовок главной страницы -->
            <h1>Магазин Artem35</h1>
            <!-- Подзаголовок/описание -->
            <p>Информация о заказах и куда их надо доставить.</p>
            <div class="actions">
                <!-- CTA-кнопка: переход на страницу с таблицей заказов -->
                <a class="btn" href="orders.html">Проверить заказ</a>
            </div>
        </div>
    </main>
    <!-- Footer: контакты + адрес + иконки соцсетей -->
    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-main">
                <div><a href="tel:+79215555525">+7 921 555 55 25</a></div>
                <div><a href="mailto:Vol35Super@yandex.ru">Vol35Super@yandex.ru</a></div>
            </div>
            <div class="footer-sub">Россия, г.Вологда, ул.Дальняя улица, 33</div>
            <!-- Социальные кнопки  -->
            <div class="social" aria-label="Социальные сети">
                <a href="#" aria-label="VK">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M3.9 7.8c.1 4 2.3 8.4 7.2 8.4h1.9v-2.5c1.4.1 2.5 1.1 2.9 2.5h4.1c-.5-2-2-3.6-3.5-4.2 1.4-1 2.4-3 2.8-4.2h-3.8c-.5 1.6-1.8 4-2.5 4V7.8h-3.6v7c-.8 0-2.8-2.8-3-7H3.9z"/>
                    </svg>
                </a>
                <a href="#" aria-label="Telegram">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M20.9 4.6 2.7 11.7c-1.2.5-1.2 1.1-.2 1.4l4.6 1.4 1.8 5.4c.2.6.1.8.7.8.5 0 .7-.2 1-.5l2.2-2.1 4.6 3.4c.9.5 1.5.2 1.7-.8l3.1-14.7c.3-1.2-.5-1.7-1.3-1.3Zm-2.6 3.2-9.2 8.3c-.3.3-.6.1-.4-.2l10.8-6.8c.5-.3 1-.1.6.7Z"/>
                    </svg>
                </a>
                <a href="#" aria-label="X">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M18.9 3H21l-6.6 7.5L22 21h-6.2l-4.9-6.4L5.2 21H3l7.1-8.2L2 3h6.3l4.4 5.9L18.9 3Zm-1.1 16.2h1.2L7.6 4.7H6.3l11.5 14.5Z"/>
                    </svg>
                </a>
            </div>
        </div>
    </footer>
</body>
</html>
