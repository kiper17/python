<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты</title>
    <!--Мета-теги-->
    <meta name="description" content="Сайт об оптических иллюзиях, их видах и научных объяснениях">
    <meta name="keywords" content="оптические иллюзии, визуальное восприятие, обман зрения, виды иллюзий, наука, психология">
    <meta name="author" content="Лощилова Анна">
    <!--Импорт шрифта-->    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gravitas+One&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Gravitas One', cursive;
            background-color: #c3e4f5;
        }

        /*Стили для основного контейнера*/
        .main-container {
            margin: 20px;
            padding: 20px;
        }

        .page-title {
            font-size: 48px;
            font-weight: bold;
            color: black;
            text-align: center;
            margin-bottom: 30px;
        }

        .subtitle {
            font-size: 32px;
            font-weight: bold;
            color: black;
            text-align: center;
            margin-bottom: 30px;
        }

        /*Стили для информации о контактах*/
        .contact-info {
            background-color: #FFFFFF;
            border: 2px solid #000000;
            padding: 20px;
            text-align: center;
            font-size: 32px;
            color: #333;
            margin-bottom: 30px;
            width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .contact-item {
            margin: 15px 0;
        }

        /*Стили для изображения*/
        .image-container {
            text-align: center;
        }

        .contact-image {
            width: 1400px;
            height: 500px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <h1 class="page-title">КОНТАКТЫ</h1>
        <h2 class="subtitle">Остались вопросы? Задайте их нам!</h2>
        
        <div class="contact-info">
            <div class="contact-item">Наша почта: тут почта</div>
            <div class="contact-item">Номер горячей линии: тут номер</div>
        </div>
        
        <div class="image-container">
            <img src="image/image2.png" alt="Контакты" class="contact-image">
        </div>
    </div>
</body>
</html>
